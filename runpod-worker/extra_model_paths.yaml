# Tells ComfyUI to look for models under the RunPod network volume
# (mounted at /runpod-volume) in addition to its built-in /comfyui/models.
# This lets us drop new checkpoints / LoRAs / ControlNets onto the volume
# without rebuilding the image.
runpod_worker_comfy:
  base_path: /runpod-volume
  checkpoints: models/checkpoints/
  clip: models/clip/
  clip_vision: models/clip_vision/
  configs: models/configs/
  controlnet: models/controlnet/
  embeddings: models/embeddings/
  loras: models/loras/
  upscale_models: models/upscale_models/
  vae: models/vae/
  unet: models/unet/
  diffusion_models: models/diffusion_models/
